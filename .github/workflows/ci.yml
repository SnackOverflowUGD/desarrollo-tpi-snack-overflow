name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  server:
    name: Backend (server)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        # Non-blocking for now: committed code predates a consistent prettier pass
        # (~265 eslint issues, mostly formatting). A coordinated `prettier --write`
        # sweep is deferred until iteration-1 branches merge, to avoid conflict churn
        # in devs' in-flight local work. Flip continue-on-error to false after that.
        continue-on-error: true
        run: npx eslint src test --no-error-on-unmatched-pattern

      - name: Unit tests + coverage
        run: npm run test:cov

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: server/coverage/
          retention-days: 7

  client:
    name: Frontend (client)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
